name: Format domain schema once

on:
  push:
    branches: [chatgpt/develop]
    paths:
      - ".github/workflows/format-domain-schema.yml"
      - "apps/site/lib/db/schema/**"
      - "apps/site/lib/events/dispatcher.ts"

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[skip-format-domain]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: chatgpt/develop
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --write apps/site/lib/db/schema apps/site/lib/events/dispatcher.ts
      - name: Commit formatted files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "skillib-ci"
          git config user.email "actions@users.noreply.github.com"
          git add apps/site/lib/db/schema apps/site/lib/events/dispatcher.ts
          git commit -m "style(db): format domain schema [skip-format-domain]"
          git push origin HEAD:chatgpt/develop
