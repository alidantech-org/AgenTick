name: CI

on:
  push:
    branches: [main, "chatgpt/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: corepack enable
      - name: Install dependencies
        shell: bash
        run: |
          pnpm install --frozen-lockfile > /tmp/skillib-install.log 2>&1
      - name: Format check
        shell: bash
        run: |
          pnpm format:check > /tmp/skillib-format.log 2>&1
      - name: Typecheck
        shell: bash
        run: |
          pnpm typecheck > /tmp/skillib-typecheck.log 2>&1
      - name: Test
        shell: bash
        run: |
          pnpm test > /tmp/skillib-test.log 2>&1
      - name: Build
        shell: bash
        run: |
          pnpm build > /tmp/skillib-build.log 2>&1
      - name: Packed CLI smoke
        shell: bash
        run: |
          set -euo pipefail
          pack_dir=/tmp/skillib-pack
          global_home=/tmp/skillib-global
          rm -rf "$pack_dir" "$global_home"
          mkdir -p "$pack_dir" "$global_home"
          pnpm --filter skillib pack --pack-destination "$pack_dir" > /tmp/skillib-package.log 2>&1
          tarball="$(find "$pack_dir" -maxdepth 1 -name 'skillib-*.tgz' -print -quit)"
          test -n "$tarball"
          if tar -xOf "$tarball" package/package.json | grep -q 'workspace:'; then
            echo "Packed Skillib artifact contains workspace protocol dependencies" >> /tmp/skillib-package.log
            exit 1
          fi
          export PNPM_HOME="$global_home"
          export PATH="$PNPM_HOME/bin:$PNPM_HOME:$PATH"
          pnpm add --global "$tarball" >> /tmp/skillib-package.log 2>&1
          skillib --help >> /tmp/skillib-package.log 2>&1
      - name: Runtime smoke
        shell: bash
        env:
          DATABASE_URL: file:/tmp/skillib-ci.db
          AUTH_SECRET: skillib-ci-auth-secret
          SKILLIB_TOKEN_PEPPER: skillib-ci-token-pepper
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3100
        run: |
          pnpm --filter @alidantech/skillib-site exec next start --hostname 127.0.0.1 --port 3100 > /tmp/skillib-runtime.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          ready=0
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3100/api/health > /dev/null; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            cat /tmp/skillib-runtime.log
            exit 1
          fi
          for path in / /skills /login /api/health; do
            curl -fsS "http://127.0.0.1:3100${path}" > /dev/null
          done
      - name: Upload failed command logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          path: /tmp/skillib-*.log
          if-no-files-found: ignore
