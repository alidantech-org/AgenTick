name: Clean implementation artifacts

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: clean-agentick-implementation
  cancel-in-progress: true

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: chatgpt/bootstrap
          fetch-depth: 0
          show-progress: false
      - name: Remove generated and temporary files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .agentick-update .turbo apps/site/.turbo packages/*/.turbo
          if ! grep -qxF '.turbo/' .gitignore; then
            printf '\n.turbo/\n' >> .gitignore
          fi
      - name: Publish cleanup commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: remove generated implementation artifacts'
          git push origin HEAD:chatgpt/bootstrap
