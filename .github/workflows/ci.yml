name: CI

on:
  push:
    branches: [main, "chatgpt/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: corepack enable
      - name: Install dependencies
        shell: bash
        run: |
          pnpm install --frozen-lockfile > /tmp/agentick-install.log 2>&1
      - name: Format check
        shell: bash
        run: |
          pnpm format:check > /tmp/agentick-format.log 2>&1
      - name: Typecheck
        shell: bash
        run: |
          pnpm typecheck > /tmp/agentick-typecheck.log 2>&1
      - name: Test
        shell: bash
        run: |
          pnpm test > /tmp/agentick-test.log 2>&1
      - name: Build
        shell: bash
        run: |
          pnpm build > /tmp/agentick-build.log 2>&1
      - name: Upload failed command logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          path: /tmp/agentick-*.log
          if-no-files-found: ignore
