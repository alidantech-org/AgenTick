name: CI

on:
  push:
    branches: [main, 'chatgpt/**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: corepack enable
      - name: Install dependencies
        shell: bash
        run: |
          if ! pnpm install --no-frozen-lockfile > /tmp/agentick-install.log 2>&1; then
            tail -n 40 /tmp/agentick-install.log
            exit 1
          fi
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
