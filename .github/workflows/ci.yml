name: Apply AgenTick implementation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-agentick-implementation
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: chatgpt/bootstrap
          fetch-depth: 0
          show-progress: false
      - name: Verify staged patch
        shell: bash
        run: |
          set -euo pipefail
          cat .agentick-update/patch.b64.* | base64 --decode > /tmp/agentick.patch.xz
          echo 'bceebb19f19dd4b51da6a7748ea6908afbc9de7808479b93e713be93868313da  /tmp/agentick.patch.xz' | sha256sum --check
          xz --decompress --stdout /tmp/agentick.patch.xz > /tmp/agentick.patch
      - name: Apply source update
        shell: bash
        run: |
          set -euo pipefail
          git reset --hard 1052082f4f42a496f8ffcb65c4ae74c0508a6c0c
          patch --batch --forward -p1 < /tmp/agentick.patch
          test -z "$(find . -name '*.rej' -print -quit)"
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: corepack enable
      - name: Install and format
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --no-frozen-lockfile > /tmp/agentick-install.log 2>&1
          pnpm format > /tmp/agentick-format.log 2>&1
      - name: Typecheck
        shell: bash
        run: pnpm typecheck > /tmp/agentick-typecheck.log 2>&1
      - name: Test
        shell: bash
        run: pnpm test > /tmp/agentick-test.log 2>&1
      - name: Build
        shell: bash
        run: pnpm build > /tmp/agentick-build.log 2>&1
      - name: Publish implementation commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: build authenticated skill registry and product site'
          git push --force-with-lease origin HEAD:chatgpt/bootstrap
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: implementation-diagnostics
          path: /tmp/agentick-*.log
          if-no-files-found: ignore
