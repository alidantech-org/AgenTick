name: CI

on:
  push:
    branches: [main, 'chatgpt/**']
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: corepack enable
      - name: Install dependencies
        shell: bash
        run: |
          pnpm install --no-frozen-lockfile > /tmp/agentick-install.log 2>&1
      - name: Commit generated lockfile
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml && git ls-files --error-unmatch pnpm-lock.yaml >/dev/null 2>&1; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "build: add pnpm lockfile"
          git push origin HEAD:${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}
      - name: Typecheck
        shell: bash
        run: |
          pnpm typecheck > /tmp/agentick-typecheck.log 2>&1
      - name: Test
        shell: bash
        run: |
          pnpm test > /tmp/agentick-test.log 2>&1
      - name: Build
        shell: bash
        run: |
          pnpm build > /tmp/agentick-build.log 2>&1
      - name: Upload failed command logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          path: /tmp/agentick-*.log
          if-no-files-found: ignore
