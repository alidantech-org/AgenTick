name: Format registry upgrade

on:
  push:
    branches: [chatgpt/develop]
    paths:
      - .github/workflows/format-registry-upgrade.yml

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, '[skip registry-format]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: chatgpt/develop
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Format upgrade files
        run: |
          pnpm exec prettier --write \
            agents/work/REGISTRY_UPGRADE_PLAN.md \
            agents/work/TASKS.md \
            apps/site/lib/db/schema/analytics.ts \
            apps/site/lib/db/schema/audit.ts \
            apps/site/lib/db/schema/catalog.ts \
            apps/site/lib/db/schema/events.ts \
            apps/site/lib/db/schema/platform.ts \
            apps/site/lib/db/schema/registry.ts \
            apps/site/lib/db/schema/storage.ts \
            apps/site/lib/db/schema/users.ts \
            apps/site/lib/events/dispatcher.ts \
            apps/site/lib/registry/service.ts
      - name: Commit formatting
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "skillib-format-bot"
          git config user.email "actions@users.noreply.github.com"
          git add agents/work apps/site/lib
          git commit -m "style: format registry upgrade [skip registry-format]"
          git push origin HEAD:chatgpt/develop
