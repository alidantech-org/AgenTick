name: Format final Skillib packaging fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: chatgpt/develop
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm prettier --write packages/skillib/tsup.config.ts scripts/install-skillib-global.mjs
      - name: Commit formatting
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add packages/skillib/tsup.config.ts scripts/install-skillib-global.mjs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'style: format final Skillib packaging fix'
          git push origin HEAD:chatgpt/develop
