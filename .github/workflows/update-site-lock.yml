name: Update site lockfile

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  update-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: chatgpt/develop
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: corepack enable
      - name: Update dependencies
        run: pnpm install --no-frozen-lockfile > /tmp/agentick-site-install.log 2>&1
      - name: Commit lockfile
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add pnpm-lock.yaml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'chore: update lockfile for themed site'
          git push origin HEAD:chatgpt/develop
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: site-lock-diagnostics
          path: /tmp/agentick-site-install.log
          if-no-files-found: error
