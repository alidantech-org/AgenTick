name: Format site once

on:
  pull_request:
    branches: [main]
    paths:
      - .github/format-site-once.trigger

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: chatgpt/develop
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm prettier --write apps/site/app/page.tsx
      - name: Commit formatted landing page
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add apps/site/app/page.tsx
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'style(site): format landing page'
          git push origin HEAD:chatgpt/develop
