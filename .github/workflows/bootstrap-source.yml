name: Bootstrap AgenTick source

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.event.pull_request.head.ref == 'chatgpt/bootstrap'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt/bootstrap
          fetch-depth: 0

      - name: Expand source
        id: expand
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d .agentick-bootstrap ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat .agentick-bootstrap/source.b64.* | base64 --decode > /tmp/agentick-source.tgz
          tar -xzf /tmp/agentick-source.tgz
          cp LICENSE packages/agentick/LICENSE
          cp LICENSE packages/config/LICENSE
          cp LICENSE packages/shared/LICENSE
          cp LICENSE packages/skill-lib/LICENSE
          rm -rf .agentick-bootstrap
          rm -f .github/workflows/bootstrap.yml
          rm -f .github/workflows/ci.yml
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit source
        if: steps.expand.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: bootstrap AgenTick monorepo"
          git push origin HEAD:chatgpt/bootstrap
