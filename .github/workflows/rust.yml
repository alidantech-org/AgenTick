name: Rust

on:
  push:
    branches: [chatgpt/develop, main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - ".github/workflows/rust.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned Rust toolchain
        run: rustup show
      - name: Enforce focused Rust files
        run: |
          violations=$(find crates -name '*.rs' -print0 | xargs -0 -r wc -l | awk '$1 > 150 && $2 != "total" {print}')
          if [ -n "$violations" ]; then
            echo "Rust files must remain at or below 150 lines:"
            echo "$violations"
            exit 1
          fi
      - name: Format ephemeral checkout
        run: cargo fmt --all
      - name: Clippy
        id: clippy
        continue-on-error: true
        run: |
          set -o pipefail
          cargo clippy --quiet --workspace --all-targets -- -D warnings 2>&1 | tee rust-clippy.log
      - name: Upload compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-diagnostics
          path: rust-clippy.log
      - name: Require clean clippy
        if: steps.clippy.outcome != 'success'
        run: exit 1
      - name: Test
        run: cargo test --quiet --workspace
      - name: Release build
        run: cargo build --quiet --workspace --release
