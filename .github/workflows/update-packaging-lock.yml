name: Update Skillib packaging lockfile

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  update-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: chatgpt/develop
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: corepack enable
      - name: Update dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Format changed files
        run: pnpm format
      - name: Commit lockfile
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add pnpm-lock.yaml package.json packages/skillib/package.json packages/skillib/tsup.config.ts scripts/install-skillib-global.mjs README.md packages/skillib/README.md .gitignore
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'fix(skillib): make packed CLI globally installable'
          git push origin HEAD:chatgpt/develop
