name: Bootstrap source

on:
  push:
    branches:
      - chatgpt/bootstrap

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Expand source
        shell: bash
        run: |
          set -euo pipefail
          cat .agentick-bootstrap/source.b64.* | base64 --decode > /tmp/agentick-source.tgz
          tar -xzf /tmp/agentick-source.tgz
          cp LICENSE packages/agentick/LICENSE
          cp LICENSE packages/config/LICENSE
          cp LICENSE packages/shared/LICENSE
          cp LICENSE packages/skill-lib/LICENSE
          rm -rf .agentick-bootstrap
          rm -f .github/workflows/bootstrap.yml

      - name: Commit source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: bootstrap AgenTick monorepo"
          git push
